{% extends "bootstrap4/admin/base.html" %}

{% block head_tail %}
<style>
/* ── DWDM Admin BD — Dark Theme ──────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg-main:    #0d1525;
  --bg-card:    #131e35;
  --bg-hover:   #1a2845;
  --border:     #1e3058;
  --accent:     #2d8bff;
  --accent-h:   #1a7af0;
  --green:      #00e5a0;
  --red:        #ff4757;
  --yellow:     #ffd400;
  --text:       #e8f0fe;
  --text-sec:   #8899bb;
  --text-muted: #4d6080;
  --font:       'Inter', system-ui, -apple-system, sans-serif;
  --mono:       'JetBrains Mono', 'Fira Code', monospace;
}

/* ── Base ──────────────────────────────────────────────────────────────── */
html, body {
  background: var(--bg-main) !important;
  color: var(--text) !important;
  font-family: var(--font) !important;
  font-size: 13px;
}

/* ── Navbar ─────────────────────────────────────────────────────────────── */
.navbar {
  background: var(--bg-main) !important;
  border-bottom: 1px solid var(--border) !important;
  padding: 0 20px;
  min-height: 52px;
}
.navbar-brand {
  color: var(--accent) !important;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.3px;
  padding: 14px 0;
}
.navbar-brand:hover { color: #7bb8ff !important; }
.navbar-nav .nav-link {
  color: var(--text-sec) !important;
  font-size: 13px;
  font-weight: 500;
  padding: 14px 14px !important;
  transition: color 0.15s;
}
.navbar-nav .nav-link:hover   { color: var(--text) !important; }
.navbar-nav .active .nav-link { color: var(--accent) !important; }
.navbar-nav .nav-link.back-link {
  color: var(--text-muted) !important;
  border-left: 1px solid var(--border);
  margin-left: 10px;
  padding-left: 14px !important;
  font-size: 12px;
}
.navbar-nav .nav-link.back-link:hover { color: var(--accent) !important; }
.dropdown-menu {
  background: var(--bg-card) !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  border-radius: 8px;
  padding: 6px 0;
}
.dropdown-item {
  color: var(--text-sec) !important;
  font-size: 12px;
  padding: 7px 16px;
}
.dropdown-item:hover {
  background: var(--bg-hover) !important;
  color: var(--text) !important;
}
.dropdown-divider { border-color: var(--border); }

/* ── Container ──────────────────────────────────────────────────────────── */
.container, .container-fluid {
  background: var(--bg-main);
  padding-top: 20px;
}

/* ── Cards ──────────────────────────────────────────────────────────────── */
.card {
  background: var(--bg-card) !important;
  border: 1px solid var(--border) !important;
  border-radius: 12px !important;
}
.card-header {
  background: var(--bg-main) !important;
  border-bottom: 1px solid var(--border) !important;
  color: var(--text) !important;
  font-weight: 600;
  font-size: 13px;
  padding: 14px 20px;
  border-radius: 12px 12px 0 0 !important;
}
.card-body { padding: 20px; }

/* ── Tables ─────────────────────────────────────────────────────────────── */
.table {
  color: var(--text) !important;
  border-color: var(--border) !important;
  margin-bottom: 0;
}
.table thead th {
  background: var(--bg-main) !important;
  border-color: var(--border) !important;
  color: var(--text-muted) !important;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 10px 14px;
}
.table td, .table th {
  border-color: var(--border) !important;
  padding: 10px 14px;
  vertical-align: middle;
}
.table-bordered { border-color: var(--border) !important; }
.table tbody tr { background: var(--bg-card); transition: background 0.1s; }
.table tbody tr:hover { background: var(--bg-hover) !important; }
.table-striped tbody tr:nth-of-type(odd) { background: rgba(255,255,255,0.015); }
.table-striped tbody tr:nth-of-type(odd):hover { background: var(--bg-hover) !important; }

/* ── Forms ──────────────────────────────────────────────────────────────── */
.form-control {
  background: var(--bg-main) !important;
  border: 1px solid var(--border) !important;
  color: var(--text) !important;
  border-radius: 6px !important;
  font-size: 13px;
  padding: 7px 12px;
  height: auto;
}
.form-control:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(45,139,255,0.15) !important;
  background: var(--bg-main) !important;
  color: var(--text) !important;
}
.form-control::placeholder { color: var(--text-muted) !important; }
select.form-control option  { background: var(--bg-card); color: var(--text); }
label {
  color: var(--text-sec);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.form-group { margin-bottom: 16px; }
.col-form-label { color: var(--text-sec) !important; font-size: 12px; font-weight: 600; }
.form-control-static { color: var(--text); }

/* ── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  font-size: 12px;
  font-weight: 600;
  border-radius: 6px !important;
  padding: 6px 14px;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--accent) !important;
  border-color: var(--accent) !important;
  color: #fff !important;
}
.btn-primary:hover {
  background: var(--accent-h) !important;
  border-color: var(--accent-h) !important;
}
.btn-secondary, .btn-default, .btn-outline-secondary {
  background: var(--bg-card) !important;
  border-color: var(--border) !important;
  color: var(--text) !important;
}
.btn-secondary:hover, .btn-default:hover {
  background: var(--bg-hover) !important;
  border-color: #2a3d5e !important;
}
.btn-danger {
  background: rgba(255,71,87,0.15) !important;
  border-color: rgba(255,71,87,0.4) !important;
  color: var(--red) !important;
}
.btn-danger:hover {
  background: rgba(255,71,87,0.25) !important;
}
.btn-success {
  background: rgba(0,229,160,0.15) !important;
  border-color: rgba(0,229,160,0.4) !important;
  color: var(--green) !important;
}
.btn-sm { padding: 4px 10px !important; font-size: 11px !important; }

/* ── Pagination ─────────────────────────────────────────────────────────── */
.pagination { gap: 2px; }
.page-link {
  background: var(--bg-card) !important;
  border-color: var(--border) !important;
  color: var(--accent) !important;
  border-radius: 5px !important;
  font-size: 12px;
  padding: 5px 10px;
}
.page-link:hover { background: var(--bg-hover) !important; color: var(--text) !important; }
.page-item.active .page-link {
  background: var(--accent) !important;
  border-color: var(--accent) !important;
  color: #fff !important;
}
.page-item.disabled .page-link {
  background: var(--bg-main) !important;
  color: var(--text-muted) !important;
}

/* ── Alerts ─────────────────────────────────────────────────────────────── */
.alert {
  border-radius: 8px !important;
  font-size: 13px;
  padding: 10px 16px;
}
.alert-info    { background: rgba(45,139,255,0.1) !important; border-color: rgba(45,139,255,0.3) !important; color: var(--text) !important; }
.alert-success { background: rgba(0,229,160,0.1) !important;  border-color: rgba(0,229,160,0.3) !important;  color: var(--text) !important; }
.alert-warning { background: rgba(255,212,0,0.1) !important;  border-color: rgba(255,212,0,0.3) !important;  color: var(--text) !important; }
.alert-danger  { background: rgba(255,71,87,0.1)  !important; border-color: rgba(255,71,87,0.3)  !important; color: var(--text) !important; }

/* ── Breadcrumb ─────────────────────────────────────────────────────────── */
.breadcrumb {
  background: var(--bg-card) !important;
  border: 1px solid var(--border);
  border-radius: 6px !important;
  padding: 8px 16px !important;
  font-size: 12px;
}
.breadcrumb-item + .breadcrumb-item::before { color: var(--text-muted); }
.breadcrumb-item a   { color: var(--accent);      text-decoration: none; }
.breadcrumb-item a:hover { color: var(--text); }
.breadcrumb-item.active { color: var(--text-sec); }

/* ── Select2 ────────────────────────────────────────────────────────────── */
.select2-container--default .select2-selection--single,
.select2-container--default .select2-selection--multiple {
  background: var(--bg-main) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px !important;
  min-height: 34px;
}
.select2-container--default .select2-selection--single .select2-selection__rendered {
  color: var(--text) !important;
  line-height: 32px;
  padding-left: 12px;
}
.select2-container--default .select2-selection--single .select2-selection__arrow b { border-top-color: var(--text-muted); }
.select2-dropdown {
  background: var(--bg-card) !important;
  border: 1px solid var(--border) !important;
  border-radius: 8px !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.select2-container--default .select2-search--dropdown .select2-search__field {
  background: var(--bg-main) !important;
  border-color: var(--border) !important;
  color: var(--text) !important;
  border-radius: 4px;
}
.select2-container--default .select2-results__option {
  color: var(--text) !important;
  font-size: 12px;
  padding: 7px 12px;
}
.select2-container--default .select2-results__option--highlighted[aria-selected] {
  background: var(--accent) !important;
  color: #fff !important;
}
.select2-container--default .select2-results__option[aria-selected=true] {
  background: var(--bg-hover) !important;
  color: var(--accent) !important;
}

/* ── Input groups ───────────────────────────────────────────────────────── */
.input-group-text {
  background: var(--bg-hover) !important;
  border-color: var(--border) !important;
  color: var(--text-sec) !important;
  font-size: 12px;
}

/* ── Modals ─────────────────────────────────────────────────────────────── */
.modal-content {
  background: var(--bg-card) !important;
  border: 1px solid var(--border) !important;
  border-radius: 12px !important;
}
.modal-header {
  background: var(--bg-main) !important;
  border-bottom: 1px solid var(--border) !important;
  border-radius: 12px 12px 0 0 !important;
  padding: 16px 20px;
}
.modal-title { color: var(--text) !important; font-weight: 700; }
.modal-footer {
  background: var(--bg-main) !important;
  border-top: 1px solid var(--border) !important;
  border-radius: 0 0 12px 12px !important;
}
.close { color: var(--text-sec) !important; opacity: 0.8; }
.close:hover { color: var(--text) !important; opacity: 1; }

/* ── Filter bar ─────────────────────────────────────────────────────────── */
.filters {
  background: var(--bg-card) !important;
  border: 1px solid var(--border) !important;
  border-radius: 8px;
}

/* ── Action bar (bulk actions) ──────────────────────────────────────────── */
.action-bar {
  background: var(--bg-card) !important;
  border-top: 1px solid var(--border) !important;
  padding: 10px 14px;
}

/* ── Boolean icons ──────────────────────────────────────────────────────── */
.glyphicon-ok  { color: var(--green) !important; }
.glyphicon-ban-circle { color: var(--red) !important; }

/* ── Row actions (edit/delete icons) ────────────────────────────────────── */
.icon-edit   { color: var(--accent) !important; }
.icon-remove { color: var(--red) !important; }

/* ── Misc ───────────────────────────────────────────────────────────────── */
.text-muted  { color: var(--text-muted) !important; }
hr           { border-color: var(--border); }
a            { color: var(--accent); }
a:hover      { color: #7bb8ff; }
code         { background: var(--bg-main); color: #00d4ff; border-radius: 4px; padding: 1px 5px; font-size: 11px; }

::-webkit-scrollbar       { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a3d5e; border-radius: 3px; }
</style>
{% endblock %}

{% block menu_links %}
<ul class="nav navbar-nav ml-auto">
  {{ layout.menu_links() }}
  <li class="nav-item">
    <a class="nav-link back-link" href="http://localhost:8080" target="_blank">← Volver a la App</a>
  </li>
</ul>
{% endblock %}
