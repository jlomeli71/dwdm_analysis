<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DWDM Topology — Red ISP Tx</title>
  <meta name="description" content="Aplicación de gestión y visualización de topología DWDM para ISP México — Red ISP Tx" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- D3.js para grafo de topología -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<!-- Chart.js para dashboards -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Aplicar tema guardado antes de pintar (evita destello) -->
  <script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');</script>
  <!-- Grain overlay: textura sutil sobre el fondo (pointer-events-none) -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- ── Top Nav ───────────────────────────────────────────────────────────── -->
  <header class="topnav" id="topnav">
    <div class="topnav-brand">
      <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <div>
        <div class="logo-title">DWDM</div>
        <div class="logo-sub">Red ISP Tx</div>
      </div>
    </div>

    <nav class="topnav-nav">
      <a class="nav-item active" data-page="topology" href="#topology">
        <span class="nav-icon">🗺</span>
        <span class="nav-label">Topología</span>
      </a>
      <a class="nav-item" data-page="crud" href="#crud">
        <span class="nav-icon">🗄</span>
        <span class="nav-label">Gestión de Red</span>
      </a>
      <a class="nav-item" data-page="dashboard" href="#dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" data-page="simulation" href="#simulation">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Simulación</span>
      </a>
      <a class="nav-item" data-page="reports" href="#reports">
        <span class="nav-icon">📄</span>
        <span class="nav-label">Reportes</span>
      </a>
      <a class="nav-item nav-item--external" id="nav-admin-db" href="#" target="_blank" rel="noopener" title="Abrir explorador de base de datos en nueva pestaña">
        <span class="nav-icon">🗃</span>
        <span class="nav-label">Admin BD</span>
      </a>
      <a class="nav-item" data-page="isp" href="#isp">
        <span class="nav-icon">🌐</span>
        <span class="nav-label">Capa IP/ISP</span>
      </a>
      <a class="nav-item" data-page="help" href="#help">
        <span class="nav-icon">❓</span>
        <span class="nav-label">Ayuda</span>
      </a>
    </nav>

    <button id="theme-toggle" title="Modo claro">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span id="theme-label">Claro</span>
    </button>

    <div class="topnav-info">
      Red óptica ISP · C-band 96ch · Ciena &amp; Infinera
    </div>
  </header>

  <!-- ── Main Content ────────────────────────────────────────────────────── -->
  <main class="main-content" id="main-content">
    <div id="page-container" style="padding:24px;height:100%;box-sizing:border-box;overflow-y:auto;"></div>
  </main>

  <!-- ── Toast container (sin JS inline) ──────────────────────────────────── -->
  <div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

  <!-- ── Scripts (type=module) ─────────────────────────────────────────────── -->
  <script type="module">
    import { renderTopology }   from './topology.js';
    import { renderCrud }       from './crud.js';
    import { renderDashboard }  from './dashboard.js';
    import { renderSimulation } from './simulation.js';
    import { renderReports }    from './reports.js';
    import { renderHelp }       from './help.js';
    import { renderISPLayer }   from './isp_layer.js';

    const pages = {
      topology:   renderTopology,
      crud:       renderCrud,
      dashboard:  renderDashboard,
      simulation: renderSimulation,
      reports:    renderReports,
      help:       renderHelp,
      isp:        renderISPLayer,
    };

    const container = document.getElementById('page-container');

    async function navigate(page) {
      // Actualizar nav activo
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.page === page);
      });
      container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Cargando…</span></div>';
      try {
        await pages[page](container);
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="error-state">
          <div style="font-size:48px">⚠️</div>
          <div>Error al cargar la página</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:8px">${err.message || ''}</div>
        </div>`;
      }
    }

    // Routing por hash
    function getPage() {
      const hash = location.hash.replace('#', '') || 'topology';
      return pages[hash] ? hash : 'topology';
    }

    window.addEventListener('hashchange', () => navigate(getPage()));
    navigate(getPage());

    // Enlace Admin BD — apunta al /admin del backend (mismo host, puerto 5001)
    document.getElementById('nav-admin-db').href =
      `${location.protocol}//${location.hostname}:5001/admin`;

    // ── Toggle de tema claro / oscuro ───────────────────────
    const themeBtn   = document.getElementById('theme-toggle');
    const themeIcon  = document.getElementById('theme-icon');
    const themeLabel = document.getElementById('theme-label');
    // SVG paths: sun (dark mode) vs moon (light mode)
    const SVG_SUN  = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
    const SVG_MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    function syncThemeBtn() {
      const isLight = document.body.classList.contains('light');
      themeIcon.innerHTML    = isLight ? SVG_MOON : SVG_SUN;
      themeLabel.textContent = isLight ? 'Oscuro' : 'Claro';
      themeBtn.title = isLight ? 'Cambiar a modo oscuro' : 'Cambiar a modo claro';
    }
    syncThemeBtn();
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
      syncThemeBtn();
    });
  </script>
</body>
</html>
